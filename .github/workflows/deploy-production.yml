name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag, or commit SHA to deploy"
        required: true
        default: "main"

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/maevskyy/recommender_sloco

jobs:
  deploy-production:
    name: Deploy production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout selected ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pipx install poetry==2.1.3

      - name: Install dependencies
        run: poetry install --no-interaction --no-ansi

      - name: Check lock
        run: poetry check --lock

      - name: Lint
        run: poetry run ruff check .

      - name: Typecheck
        run: poetry run mypy src

      - name: Test
        run: poetry run pytest

      - name: Resolve image tags
        id: image
        run: |
          SHORT_SHA="$(git rev-parse --short=12 HEAD)"
          echo "sha_tag=${IMAGE_NAME}:${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "latest_tag=${IMAGE_NAME}:prod-latest" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.sha_tag }}
            ${{ steps.image.outputs.latest_tag }}

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.2
        env:
          RECOMMENDATION_SERVICE_IMAGE: ${{ steps.image.outputs.sha_tag }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: RECOMMENDATION_SERVICE_IMAGE,GHCR_USERNAME,GHCR_READ_TOKEN
          script: |
            set -euo pipefail

            cd /opt/backend_sloco

            if [ -n "${GHCR_USERNAME:-}" ] && [ -n "${GHCR_READ_TOKEN:-}" ]; then
              echo "$GHCR_READ_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            fi

            if grep -q '^RECOMMENDATION_SERVICE_IMAGE=' .env; then
              sed -i "s|^RECOMMENDATION_SERVICE_IMAGE=.*|RECOMMENDATION_SERVICE_IMAGE=${RECOMMENDATION_SERVICE_IMAGE}|" .env
            else
              printf '\nRECOMMENDATION_SERVICE_IMAGE=%s\n' "$RECOMMENDATION_SERVICE_IMAGE" >> .env
            fi

            docker compose pull recommendation-service
            docker compose up -d recommendation-service
            docker image prune -f

            for attempt in $(seq 1 12); do
              if curl --fail --silent --show-error http://127.0.0.1:8000/v1/health; then
                exit 0
              fi

              echo "Recommendation service is not healthy yet. Attempt ${attempt}/12"
              sleep 5
            done

            docker compose ps
            docker compose logs --tail=100 recommendation-service
            exit 1
