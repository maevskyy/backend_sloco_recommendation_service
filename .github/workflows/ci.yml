name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: poetry

      - name: Install Poetry
        run: pipx install poetry==2.1.3

      - name: Install dependencies
        run: poetry install --no-interaction --no-ansi

      - name: Check lock
        run: poetry check --lock

      - name: Lint
        run: poetry run ruff check .

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: poetry

      - name: Install Poetry
        run: pipx install poetry==2.1.3

      - name: Install dependencies
        run: poetry install --no-interaction --no-ansi

      - name: Typecheck
        run: poetry run mypy src

  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: poetry

      - name: Install Poetry
        run: pipx install poetry==2.1.3

      - name: Install dependencies
        run: poetry install --no-interaction --no-ansi

      - name: Test
        run: poetry run pytest

